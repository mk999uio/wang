<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陕西嘉诚伟业会议策划有限公司</title>

<style>
body{
    margin:0;
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#0b0f1a;
    color:#fff;
    overflow-x:hidden;
}

/* 背景光效 */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 20% 20%, #2b5cff33, transparent 40%),
               radial-gradient(circle at 80% 30%, #ff3b3033, transparent 40%),
               radial-gradient(circle at 50% 80%, #00ffcc22, transparent 40%);
    z-index:-1;
    animation:move 10s infinite alternate;
}

@keyframes move{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
}

/* 顶部 */
header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:18px;
    font-weight:800;
    letter-spacing:1px;
}

.btn{
    padding:8px 14px;
    border:1px solid #ffffff55;
    border-radius:20px;
    font-size:12px;
}

/* 主视觉 */
.hero{
    text-align:center;
    padding:80px 20px 40px;
}

.hero h1{
    font-size:26px;
    margin-bottom:10px;
}

.hero p{
    color:#aaa;
    font-size:14px;
}

/* 按钮 */
.cta{
    margin-top:20px;
    display:inline-block;
    padding:10px 22px;
    border-radius:30px;
    background:linear-gradient(90deg,#4facfe,#00f2fe);
    color:#000;
    font-weight:bold;
}

/* 卡片 */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:14px;
    backdrop-filter: blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    font-size:14px;
    margin-bottom:6px;
}

.card p{
    font-size:12px;
    color:#bbb;
}

/* 底部 */
footer{
    text-align:center;
    padding:30px 10px;
    font-size:12px;
    color:#666;
}

/* 动画粒子 */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    background:#4facfe;
    border-radius:50%;
    animation:float 6s infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-600px);opacity:0;}
}

/* 手机适配 */
@media(max-width:600px){
    .grid{
        grid-template-columns:1fr;
    }
    .hero h1{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
    <div class="logo">嘉诚伟业</div>
    <div class="btn">会议策划专家</div>
</header>

<div class="hero">
    <h1>专业会议策划 · 品牌活动执行</h1>
    <p>陕西嘉诚伟业会议策划有限公司</p>
    <div class="cta">开启合作</div>
</div>

<div class="grid">

<div class="card">
    <h3>🎤 活动策划</h3>
    <p>大型会议、论坛、发布会全案策划执行</p>
</div>

<div class="card">
    <h3>🎬 视觉设计</h3>
    <p>舞美设计、舞台搭建、灯光音响一体化</p>
</div>

<div class="card">
    <h3>📊 品牌推广</h3>
    <p>企业品牌活动策划与传播方案制定</p>
</div>

<div class="card">
    <h3>🏢 会务服务</h3>
    <p>高端会议接待、流程管理与执行保障</p>
</div>

</div>

<footer>
© 2026 陕西嘉诚伟业会议策划有限公司 · 专业 · 高效 · 创新
</footer>

<script>

// 粒子动画
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.top=Math.random()*100+"vh";
    p.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(p);
}

// 按钮点击效果
document.querySelector(".cta").onclick=function(){
    alert("感谢关注，我们将尽快与您联系！");
};

</script>

</body>
</html>
