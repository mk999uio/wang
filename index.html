<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日热榜</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:linear-gradient(180deg,#f6f7fb,#eef1f5);
}

/* 顶部 */
.header{
    padding:18px;
    font-size:22px;
    font-weight:800;
    background:#fff;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 2px 12px rgba(0,0,0,0.05);
}

/* 容器 */
.container{
    padding:12px;
}

/* 卡片 */
.card{
    background:#fff;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    transition:0.2s;
}

.card:active{
    transform:scale(0.98);
}

/* 排名 */
.rank{
    width:30px;
    height:30px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#fff;
    margin-bottom:10px;
}

.r1{background:#ff3b30;}
.r2{background:#ff9500;}
.r3{background:#34c759;}
.r4{background:#5856d6;}
.r5{background:#007aff;}

/* 标题 */
.title{
    font-size:16px;
    font-weight:700;
    margin-bottom:6px;
    line-height:1.4;
}

/* 描述 */
.desc{
    font-size:13px;
    color:#777;
    line-height:1.5;
}

/* 标签 */
.tag{
    display:inline-block;
    font-size:12px;
    padding:2px 8px;
    border-radius:20px;
    background:#f0f0f0;
    margin-top:8px;
    color:#666;
}
</style>
</head>

<body>

<div class="header">🔥 今日热榜</div>

<div class="container">

<div class="card">
    <div class="rank r1">1</div>
    <div class="title">中国航天再传重大突破</div>
    <div class="desc">我国航天工程取得新进展，多项关键技术实现突破，引发广泛关注。</div>
    <div class="tag">科技</div>
</div>

<div class="card">
    <div class="rank r2">2</div>
    <div class="title">人工智能进入爆发阶段</div>
    <div class="desc">AI产业持续升温，大模型应用正在进入各个行业场景。</div>
    <div class="tag">AI</div>
</div>

<div class="card">
    <div class="rank r3">3</div>
    <div class="title">全球经济趋势变化分析</div>
    <div class="desc">多国经济数据发布，全球市场进入新的调整周期。</div>
    <div class="tag">财经</div>
</div>

<div class="card">
    <div class="rank r4">4</div>
    <div class="title">新能源车市场持续增长</div>
    <div class="desc">新能源汽车销量再创新高，产业链加速发展。</div>
    <div class="tag">汽车</div>
</div>

<div class="card">
    <div class="rank r5">5</div>
    <div class="title">科技公司发布新一代产品</div>
    <div class="desc">多家科技企业推出新产品，引发行业关注与讨论。</div>
    <div class="tag">科技</div>
</div>

</div>

</body>
</html>
