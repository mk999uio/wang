<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气完整版</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:30px 15px;
  color:#fff;
}

/* 容器 */
.container{
  width:100%;
  max-width:900px;
}

/* 标题 */
.title{
  text-align:center;
  font-size:42px;
  font-weight:bold;
  margin-bottom:20px;
}

/* 搜索 */
.search{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.search input{
  flex:1;
  height:48px;
  border:none;
  border-radius:12px;
  padding:0 15px;
  font-size:16px;
  outline:none;
}

.search button{
  width:120px;
  border:none;
  border-radius:12px;
  background:#1677ff;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* 顶部卡片 */
.card{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:20px;
  margin-bottom:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

.city{
  font-size:32px;
  font-weight:bold;
}

.time{
  font-size:16px;
  opacity:.9;
}

.warm{
  margin-top:10px;
  font-size:14px;
  opacity:.85;
}

/* 天气列表 */
.list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:20px;
}

.item{
  background:rgba(255,255,255,.12);
  padding:15px;
  border-radius:16px;
  text-align:center;
  transition:.3s;
}

.item:hover{
  transform:translateY(-5px);
}

.week{
  font-size:16px;
  font-weight:bold;
  margin-bottom:8px;
}

.weather{
  font-size:15px;
  margin-bottom:6px;
}

.temp{
  font-size:18px;
  font-weight:bold;
}

.pm{
  font-size:12px;
  opacity:.8;
  margin-top:5px;
}

/* 状态 */
.loading,
.error{
  text-align:center;
  margin-top:15px;
  font-size:16px;
}

.error{
  color:#ffe1e1;
}

/* 手机适配 */
@media(max-width:600px){

  .title{
    font-size:32px;
  }

  .search{
    flex-direction:column;
  }

  .search button{
    width:100%;
    height:48px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="title">🌤️ 天气完整版</div>

  <div class="search">

    <input id="cityInput" placeholder="请输入城市，例如：天津">

    <button onclick="getWeather()">查询</button>

  </div>

  <div id="loading"></div>
  <div id="error" class="error"></div>

  <div id="result"></div>

</div>

<script>

/* =========================
   核心请求
========================= */

async function getWeather(){

  const city =
  document.getElementById("cityInput")
  .value
  .trim() || "天津";

  const loading =
  document.getElementById("loading");

  const error =
  document.getElementById("error");

  const result =
  document.getElementById("result");

  loading.innerHTML = "加载中...";
  error.innerHTML = "";
  result.innerHTML = "";

  try{

    const api =
    `https://v.api.aa1.cn/api/api-tianqi-3/index.php?msg=${city}&type=1`;

    const res = await fetch(api);

    const data = await res.json();

    console.log("接口返回：", data);

    loading.innerHTML = "";

    /* =========================
       安全处理（重点优化）
    ========================= */

    const cityName = data.city || city;
    const time = (data.date_day || "") + " " + (data.date_h || "");
    const warm = data.warmWords || "";

    const list = Array.isArray(data.data) ? data.data : [];

    /* =========================
       渲染HTML
    ========================= */

    let html = `
      <div class="card">

        <div class="top">

          <div>
            <div class="city">${cityName}</div>
            <div class="warm">${warm}</div>
          </div>

          <div class="time">${time}</div>

        </div>

        <div class="list">
    `;

    list.forEach(item => {

      html += `
        <div class="item">

          <div class="week">${item.date || "--"}</div>

          <div class="weather">${item.weather || "--"}</div>

          <div class="temp">${item.temperature || "--"}</div>

          <div class="pm">PM：${item.pm || "--"}</div>

        </div>
      `;

    });

    html += `
        </div>
      </div>
    `;

    result.innerHTML = html;

  }catch(err){

    console.error(err);

    loading.innerHTML = "";

    error.innerHTML = "接口请求失败（检查网络或API）";

  }

}

/* 默认加载 */
window.onload = ()=>{

  document.getElementById("cityInput")
  .value = "天津";

  getWeather();

}

</script>

</body>
</html>
