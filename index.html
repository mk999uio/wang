<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>天气 + 知乎日报</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Microsoft YaHei",sans-serif;
      background:#f5f7fb;
      color:#333;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* 顶部背景 */

    .hero{
      position:relative;
      height:420px;
      background:
      linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
      url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
    }

    .hero-content{
      width:100%;
      max-width:1200px;
      padding:20px;
    }

    .hero-title{
      font-size:48px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .search-box{
      display:flex;
      gap:15px;
      max-width:500px;
    }

    .search-box input{
      flex:1;
      height:50px;
      border:none;
      border-radius:14px;
      padding:0 18px;
      font-size:16px;
      outline:none;
    }

    .search-box button{
      width:130px;
      border:none;
      border-radius:14px;
      background:#1677ff;
      color:#fff;
      font-size:16px;
      cursor:pointer;
      transition:.3s;
    }

    .search-box button:hover{
      background:#4096ff;
    }

    /* 天气卡片 */

    .weather-wrapper{
      max-width:1200px;
      margin:auto;
      margin-top:-80px;
      position:relative;
      z-index:2;
      padding:0 20px;
    }

    .weather-card{
      background:#fff;
      border-radius:25px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,.1);
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:20px;
    }

    .weather-left{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .city{
      font-size:38px;
      font-weight:bold;
    }

    .temp{
      font-size:70px;
      font-weight:bold;
      color:#1677ff;
    }

    .weather{
      font-size:22px;
      color:#666;
    }

    .weather-right{
      display:grid;
      grid-template-columns:repeat(2,160px);
      gap:15px;
    }

    .info-box{
      background:#f5f7fb;
      padding:18px;
      border-radius:16px;
      text-align:center;
    }

    .info-title{
      color:#888;
      margin-bottom:10px;
    }

    .info-value{
      font-size:24px;
      font-weight:bold;
      color:#333;
    }

    /* 内容区域 */

    .container{
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
    }

    .section-title{
      font-size:34px;
      font-weight:bold;
      margin-bottom:30px;
    }

    /* 顶部推荐 */

    .top-stories{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
      margin-bottom:50px;
    }

    .top-card{
      position:relative;
      height:240px;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,.15);
      transition:.3s;
    }

    .top-card:hover{
      transform:translateY(-6px);
    }

    .top-card img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .overlay{
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      padding:20px;
      background:linear-gradient(
        transparent,
        rgba(0,0,0,.85)
      );
      color:#fff;
    }

    .overlay h3{
      font-size:20px;
      line-height:1.6;
      margin-bottom:10px;
    }

    .overlay p{
      font-size:14px;
      opacity:.9;
    }

    /* 新闻列表 */

    .news-list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:30px;
    }

    .news-card{
      background:#fff;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      transition:.3s;
    }

    .news-card:hover{
      transform:translateY(-6px);
    }

    .news-card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .news-content{
      padding:22px;
    }

    .news-title{
      font-size:22px;
      font-weight:bold;
      line-height:1.7;
      margin-bottom:12px;
    }

    .news-hint{
      color:#888;
      font-size:15px;
    }

    .loading,
    .error{
      text-align:center;
      margin-top:30px;
      font-size:18px;
    }

    .error{
      color:red;
    }

    @media(max-width:768px){

      .hero{
        height:500px;
      }

      .hero-title{
        font-size:38px;
      }

      .search-box{
        flex-direction:column;
      }

      .search-box button{
        width:100%;
        height:50px;
      }

      .weather-card{
        flex-direction:column;
        align-items:flex-start;
      }

      .weather-right{
        grid-template-columns:1fr 1fr;
        width:100%;
      }

      .temp{
        font-size:55px;
      }

    }

  </style>
</head>

<body>

<!-- 顶部 -->

<div class="hero">

  <div class="hero-content">

    <div class="hero-title">
      ☁ 天气 · 知乎日报
    </div>

    <div class="search-box">

      <input
        type="text"
        id="cityInput"
        placeholder="请输入城市，例如：天津"
      >

      <button onclick="loadAllData()">
        查询天气
      </button>

    </div>

  </div>

</div>

<!-- 天气 -->

<div class="weather-wrapper">

  <div class="weather-card">

    <div class="weather-left">

      <div class="city" id="city">
        天津
      </div>

      <div class="temp" id="temp">
        --
      </div>

      <div class="weather" id="weather">
        天气加载中...
      </div>

    </div>

    <div class="weather-right">

      <div class="info-box">
        <div class="info-title">风向</div>
        <div class="info-value" id="wind">--</div>
      </div>

      <div class="info-box">
        <div class="info-title">湿度</div>
        <div class="info-value" id="humidity">--</div>
      </div>

      <div class="info-box">
        <div class="info-title">空气质量</div>
        <div class="info-value" id="air">--</div>
      </div>

      <div class="info-box">
        <div class="info-title">更新时间</div>
        <div class="info-value" id="time">--</div>
      </div>

    </div>

  </div>

</div>

<!-- 内容 -->

<div class="container">

  <div class="section-title">
    🔥 知乎推荐
  </div>

  <div id="topStories" class="top-stories"></div>

  <div class="section-title">
    📚 今日热文
  </div>

  <div id="newsList" class="news-list"></div>

  <div id="loading" class="loading"></div>

  <div id="error" class="error"></div>

</div>

<script>

/* ===========================
   天气接口
=========================== */

async function getWeather(city){

  const api =
  `https://v.api.aa1.cn/api/api-tianqi-3/index.php?msg=${city}&type=1`;

  const res = await fetch(api);

  return await res.json();

}

/* ===========================
   知乎日报接口
=========================== */

async function getZhihu(){

  const api =
  "https://v.api.aa1.cn/api/zhihu-news/index.php?aa1=xiarou";

  const res = await fetch(api);

  return await res.json();

}

/* ===========================
   加载全部
=========================== */

async function loadAllData(){

  const city =
  document.getElementById("cityInput")
  .value
  .trim() || "天津";

  const loading =
  document.getElementById("loading");

  const error =
  document.getElementById("error");

  loading.innerHTML = "正在加载数据...";

  error.innerHTML = "";

  try{

    const [weatherData, zhihuData] =
    await Promise.all([
      getWeather(city),
      getZhihu()
    ]);

    renderWeather(weatherData, city);

    renderTopStories(
      zhihuData.top_stories || []
    );

    renderNews(
      zhihuData.news || []
    );

    loading.innerHTML = "";

  }catch(err){

    console.error(err);

    loading.innerHTML = "";

    error.innerHTML =
    "接口请求失败，请使用 Live Server 运行";

  }

}

/* ===========================
   渲染天气
=========================== */

function renderWeather(data, city){

  document.getElementById("city")
  .innerHTML =
  data.city || city;

  document.getElementById("temp")
  .innerHTML =
  (data.temp || "--") + "°";

  document.getElementById("weather")
  .innerHTML =
  data.weather || "暂无天气";

  document.getElementById("wind")
  .innerHTML =
  data.wind || "--";

  document.getElementById("humidity")
  .innerHTML =
  data.humidity || "--";

  document.getElementById("air")
  .innerHTML =
  data.air || "--";

  document.getElementById("time")
  .innerHTML =
  data.time || "--";

}

/* ===========================
   渲染顶部推荐
=========================== */

function renderTopStories(list){

  const container =
  document.getElementById("topStories");

  let html = "";

  list.forEach(item=>{

    html += `
      <a href="${item.url}" target="_blank">

        <div class="top-card">

          <img src="${item.image}" />

          <div class="overlay">

            <h3>${item.title}</h3>

            <p>${item.hint}</p>

          </div>

        </div>

      </a>
    `;

  });

  container.innerHTML = html;

}

/* ===========================
   渲染新闻
=========================== */

function renderNews(list){

  const container =
  document.getElementById("newsList");

  let html = "";

  list.forEach(item=>{

    html += `
      <a href="${item.url}" target="_blank">

        <div class="news-card">

          <img src="${item.image}" />

          <div class="news-content">

            <div class="news-title">
              ${item.title}
            </div>

            <div class="news-hint">
              ${item.hint}
            </div>

          </div>

        </div>

      </a>
    `;

  });

  container.innerHTML = html;

}

/* 默认加载 */

window.onload = ()=>{

  document.getElementById("cityInput")
  .value = "天津";

  loadAllData();

}

</script>

</body>
</html>
