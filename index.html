<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气预报</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 20px;
  color:#fff;
}

.container{
  width:100%;
  max-width:900px;
}

.title{
  text-align:center;
  font-size:42px;
  font-weight:bold;
  margin-bottom:25px;
}

.search{
  display:flex;
  gap:12px;
  margin-bottom:25px;
}

.search input{
  flex:1;
  height:50px;
  border:none;
  border-radius:14px;
  padding:0 15px;
  font-size:16px;
  outline:none;
}

.search button{
  width:130px;
  border:none;
  border-radius:14px;
  background:#1677ff;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.search button:hover{
  background:#4096ff;
}

/* 顶部卡片 */

.card{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  margin-bottom:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
}

.city{
  font-size:34px;
  font-weight:bold;
}

.time{
  font-size:18px;
  opacity:.9;
}

.warm{
  margin-top:10px;
  font-size:15px;
  opacity:.85;
}

/* 逐日天气 */

.list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
  margin-top:20px;
}

.item{
  background:rgba(255,255,255,.12);
  padding:18px;
  border-radius:18px;
  text-align:center;
  transition:.3s;
}

.item:hover{
  transform:translateY(-5px);
}

.week{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.weather{
  font-size:16px;
  margin-bottom:8px;
}

.temp{
  font-size:20px;
  font-weight:bold;
  margin-bottom:8px;
}

.pm{
  font-size:13px;
  opacity:.85;
}

.loading,
.error{
  text-align:center;
  margin-top:15px;
  font-size:18px;
}

.error{
  color:#ffe1e1;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">🌤️ 天气预报</div>

  <div class="search">

    <input id="cityInput" placeholder="请输入城市，例如：天津">

    <button onclick="getWeather()">
      查询
    </button>

  </div>

  <div id="loading"></div>
  <div id="error" class="error"></div>

  <div id="result"></div>

</div>

<script>

async function getWeather(){

  const city =
  document.getElementById("cityInput")
  .value
  .trim() || "天津";

  const loading =
  document.getElementById("loading");

  const error =
  document.getElementById("error");

  const result =
  document.getElementById("result");

  loading.innerHTML = "加载中...";
  error.innerHTML = "";
  result.innerHTML = "";

  try{

    const api =
    `https://v.api.aa1.cn/api/api-tianqi-3/index.php?msg=${city}&type=1`;

    const res = await fetch(api);

    if(!res.ok){
      throw new Error("请求失败");
    }

    const data = await res.json();

    console.log(data);

    loading.innerHTML = "";

    let html = "";

    html += `
      <div class="card">

        <div class="top">

          <div>
            <div class="city">
              ${data.city}
            </div>

            <div class="warm">
              ${data.warmWords}
            </div>
          </div>

          <div class="time">
            ${data.date_day} ${data.date_h}
          </div>

        </div>

        <div class="list">
    `;

    data.data.forEach(item=>{

      html += `
        <div class="item">

          <div class="week">
            ${item.date}
          </div>

          <div class="weather">
            ${item.weather}
          </div>

          <div class="temp">
            ${item.temperature}
          </div>

          <div class="pm">
            PM：${item.pm}
          </div>

        </div>
      `;

    });

    html += `
        </div>

      </div>
    `;

    result.innerHTML = html;

  }catch(err){

    console.error(err);

    loading.innerHTML = "";

    error.innerHTML =
    "接口请求失败，请检查网络或接口";

  }

}

/* 默认加载 */
window.onload = ()=>{

  document.getElementById("cityInput")
  .value = "天津";

  getWeather();

}

</script>

</body>
</html>
